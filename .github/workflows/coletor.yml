name: coletor-3x-dia

on:
  schedule:
    # 8h, 12h, 18h horário de São Paulo (UTC-3, sem horário de verão desde 2019)
    # = 11h, 15h, 21h UTC, segunda a sábado (pula domingo).
    # Campo dia-da-semana: 0=domingo, 1=segunda ... 6=sábado.
    - cron: '0 11,15,21 * * 1-6'
  workflow_dispatch: {}

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: America/Sao_Paulo
      DOSISTEMAS_TOKEN: ${{ secrets.DOSISTEMAS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coletor
        run: python coletor.py
